# frontend/nginx.conf
server {
    listen 3001;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Redirection de / vers /home
    location = / {
        return 301 /home;
    }
    
    # Gestion des routes React (toutes les requêtes renvoient vers index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache pour les fichiers statiques
    location /static {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Pas de proxy vers backend - c'est un frontend statique !
}