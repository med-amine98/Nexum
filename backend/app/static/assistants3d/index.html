<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistants 3D Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Assistants 3D Hub</h1>
  </header>
  <main>
    <section class="mockup-section">
      <img src="assistants_3d_mockup_1781007683955.png" alt="Assistants 3D" class="mockup-image" />
    </section>
    <section class="chat-section">
      <h2>Chat avec un assistant</h2>
      <select id="assistant-select"></select>
      <textarea id="message-input" placeholder="Tapez votre message..."></textarea>
      <button id="send-btn">Envoyer</button>
      <div id="response-output" class="response"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
